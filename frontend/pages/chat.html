<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — Chat</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <!-- ========== Navigation ========== -->
    <nav class="nav">
        <a href="../index.html" class="nav-brand">
            <span class="nav-brand-icon">S</span>
            Sentinel
        </a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="chat.html" class="active">Chat</a></li>
        </ul>
    </nav>

    <!-- ========== Chat App Shell ========== -->
    <!--
        Structure matches what chat.js and style.css expect:
        - .app fills the viewport with flex column layout
        - .app-header sits at top with title/subtitle
        - .chat-window is the scrollable message area
        - #messages is the flex container for bubbles (chat.js appends here)
        - #typing-indicator shows animated dots (chat.js toggles .hidden)
        - .input-area has the form with #message-input and .send-button
    -->
    <div class="app">
        <div class="app-header">
            <div>
                <div class="app-title">Sentinel</div>
                <div class="app-subtitle">Cybersecurity Risk Engine</div>
            </div>
            <button id="clear-chat-btn" class="clear-chat-btn" title="Clear chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6" />
                    <path d="M14 11v6" />
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg>
            </button>
        </div>

        <div class="chat-window">
            <div id="messages" class="messages"></div>

            <!-- Typing indicator — hidden by default, toggled by chat.js -->
            <div id="typing-indicator" class="typing-indicator hidden">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <form id="chat-form" class="input-area">
            <input id="message-input" class="message-input" type="text" placeholder="Ask about cybersecurity risk..."
                autocomplete="off">
            <button type="submit" class="send-button">Send</button>
        </form>
    </div>

    <!-- JS: api.js provides sendToServer(), chat.js handles all UI logic -->
    <script src="../js/api.js"></script>
    <script src="../js/chat.js"></script>

</body>

</html>
